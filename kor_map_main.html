<!DOCTYPE html>
<html>
<head>
    <title>나의 대한민국 지도</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; }
    </style>
</head>
<body>
    <h2>나의 대한민국 지도 프로젝트</h2>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 한국 중심 좌표로 지도 설정 (위도 36.5, 경도 127.5)
        var map = L.map('map').setView([36.5, 127.5], 7);

        // 오픈스트리트맵 타일(지도 이미지) 추가
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 서울 시청에 마커 하나 찍어보기
        L.marker([37.5665, 126.9780]).addTo(map)
            .bindPopup('서울 시청입니다.')
            .openPopup();
    </script>
</body>
</html>
