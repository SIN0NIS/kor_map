<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대한민국 고도 및 등고선 시각화</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #control-box { padding: 15px; background: #333; color: white; display: flex; gap: 15px; align-items: center; z-index: 2000; }
        #map { flex-grow: 1; width: 100%; }
        .info-panel { position: absolute; top: 80px; right: 20px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.2); min-width: 150px; }
        select, button { padding: 8px; cursor: pointer; }
        label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div id="control-box">
        <strong>🗺️ 지도 형태:</strong>
        <select id="layer-select">
            <option value="Base">기본 지도 (2D)</option>
            <option value="white">백지도 (추천)</option>
            <option value="Satellite">위성 지도</option>
            <option value="Hybrid">하이브리드</option>
        </select>
        
        <span>|</span>
        
        <label>
            <input type="checkbox" id="contour-check" checked> 
            <strong>⛰️ 등고선(Contour) 표시</strong>
        </label>

        <span style="font-size: 0.9em; color: #ccc;">(지도를 클릭하면 해당 지점의 고도를 확인합니다)</span>
    </div>

    <div id="map"></div>
    <div class="info-panel" id="elevation-info">지도를 클릭하세요.</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 설정
        const VWORLD_KEY = '4672F099-B1DB-3541-A647-092BB3065A72'; 

        // 2. 지도 초기화 (전국이 잘 보이도록 줌 레벨 조정)
        const map = L.map('map').setView([36.5, 127.5], 7);

        // 3. 브이월드 배경지도 레이어 함수
        function getVWorldLayer(type) {
            return L.tileLayer(`https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/${type}/{z}/{y}/{x}.png`, {
                attribution: '&copy; VWorld'
            });
        }

        // 4. 등고선 WMS 레이어 생성 (브이월드 수치지형도 등고선)
        const contourLayer = L.tileLayer.wms('https://api.vworld.kr/req/wms', {
            layers: 'LT_L_AS001', // 등고선 레이어 ID
            format: 'image/png',
            transparent: true,
            key: VWORLD_KEY,
            domain: window.location.hostname
        });

        let currentBaseLayer = getVWorldLayer('white').addTo(map); // 기본을 백지도로 설정
        contourLayer.addTo(map); // 등고선 기본 활성화

        // 5. 이벤트 리스너: 배경지도 변경
        document.getElementById('layer-select').addEventListener('change', function(e) {
            map.removeLayer(currentBaseLayer);
            currentBaseLayer = getVWorldLayer(e.target.value).addTo(map);
            // 등고선 레이어가 배경에 가려지지 않도록 맨 앞으로 보냄
            if (map.hasLayer(contourLayer)) contourLayer.bringToFront();
        });

        // 6. 이벤트 리스너: 등고선 On/Off
        document.getElementById('contour-check').addEventListener('change', function(e) {
            if (e.target.checked) {
                contourLayer.addTo(map);
            } else {
                map.removeLayer(contourLayer);
            }
        });

        // 7. 핵심: 클릭 시 고도(DEM) 데이터 가져오기
        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            
            // 브이월드 고도(Elevation) API 호출 URL (검색 서비스)
            const apiUrl = `https://api.vworld.kr/req/address?service=address&request=getCoord&key=${VWORLD_KEY}&location=${lng},${lat}&type=PARCEL&ele=true`;

            // 참고: 실제 고도 전용 API는 별도 규격이 있으나, 주소 API의 ele=true 옵션이 가장 정확도가 높습니다.
            fetch(`https://api.vworld.kr/req/address?service=address&request=getcoord&key=${VWORLD_KEY}&location=${lng},${lat}&type=parcel&ele=true`)
                .then(res => res.json())
                .then(data => {
                    console.log("API 응답:", data);
                    
                    let elevation = "N/A";
                    if(data.response && data.response.status === "OK") {
                        // 결과 값에서 고도(elevation) 추출
                        elevation = data.response.result.elevation;
                    }

                    document.getElementById('elevation-info').innerHTML = 
                        `위도: ${lat.toFixed(4)}<br>경도: ${lng.toFixed(4)}<br><b>고도: ${elevation} m</b>`;
                    
                    L.popup()
                        .setLatLng(e.latlng)
                        .setContent(`고도: ${elevation}m`)
                        .openOn(map);
                })
                .catch(err => {
                    console.error("고도 데이터 호출 실패:", err);
                });
        });
    </script>
</body>
</html>
