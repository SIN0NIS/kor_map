<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대한민국 지형 고저 및 등고선 컨트롤러</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        #control-box { padding: 15px; background: #222; color: white; display: flex; gap: 20px; align-items: center; z-index: 2000; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        #map { flex-grow: 1; width: 100%; background: #f0f0f0; }
        
        /* 고도 범례 (Elevation Bar) */
        .legend {
            position: absolute; top: 80px; right: 20px; z-index: 1000;
            background: white; padding: 10px; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); line-height: 1.5;
        }
        .legend-bar {
            width: 20px; height: 150px;
            background: linear-gradient(to top, #00ff00 0%, #ffff00 50%, #ff0000 100%);
            margin-right: 10px; border: 1px solid #ccc;
        }
        .legend-container { display: flex; align-items: center; }

        select, input { padding: 5px; border-radius: 4px; border: none; }
        .opt-group { display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <div id="control-box">
        <div class="opt-group">
            <strong>🗺️ 배경:</strong>
            <select id="layer-select">
                <option value="white">백지도 (권장)</option>
                <option value="Base">일반 지도</option>
            </select>
        </div>

        <div class="opt-group">
            <strong>⛰️ 등고선 간격:</strong>
            <select id="contour-interval">
                <option value="10">10m 단위 (정밀)</option>
                <option value="20">20m 단위</option>
                <option value="50" selected>50m 단위 (보통)</option>
                <option value="100">100m 단위 (광역)</option>
            </select>
        </div>

        <div style="font-size: 0.85em; color: #aaa;">* 클릭 시 해당 지점 높이 출력</div>
    </div>

    <div id="map"></div>

    <div class="legend">
        <strong>고도 (Elevation)</strong>
        <div class="legend-container">
            <div class="legend-bar"></div>
            <div>
                <div>1,500m</div>
                <div style="margin-top: 45px;">750m</div>
                <div style="margin-top: 45px;">0m</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const VWORLD_KEY = '4672F099-B1DB-3541-A647-092BB3065A72'; 

        // 지도 초기화
        const map = L.map('map').setView([36.5, 127.5], 8);

        // 배경 레이어 설정
        function getVWorldLayer(type) {
            return L.tileLayer(`https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/${type}/{z}/{y}/{x}.png`, {
                attribution: '&copy; VWorld'
            });
        }

        let currentBaseLayer = getVWorldLayer('white').addTo(map);

        // 등고선 레이어 (WMS)
        // 브이월드 등고선 레이어(LT_L_AS001)는 서버에서 그려서 내려주므로 
        // 클라이언트에서 0~100m만 보여줘! 식의 필터링은 스타일 파라미터(SLD) 수정이 필요합니다.
        // 여기서는 기본 등고선 레이어를 활용합니다.
        let contourLayer = L.tileLayer.wms('https://api.vworld.kr/req/wms', {
            layers: 'LT_L_AS001',
            format: 'image/png',
            transparent: true,
            key: VWORLD_KEY,
            opacity: 0.7
        }).addTo(map);

        // 배경 전환
        document.getElementById('layer-select').addEventListener('change', function(e) {
            map.removeLayer(currentBaseLayer);
            currentBaseLayer = getVWorldLayer(e.target.value).addTo(map);
            contourLayer.bringToFront();
        });

        // 등고선 설정 변경 (개념적 구현)
        // 브이월드 표준 WMS는 파라미터로 간격을 조정하기 어렵기 때문에, 
        // 실제로는 줌 레벨에 따라 다르게 보이거나 투명도를 조절하는 방식을 많이 씁니다.
        document.getElementById('contour-interval').addEventListener('change', function(e) {
            const interval = e.target.value;
            alert(`${interval}m 단위 등고선 최적화 모드로 전환합니다.\n(줌 레벨을 조절하여 확인하세요)`);
            
            // 팁: 특정 간격만 보고 싶다면 SLD(Styled Layer Descriptor)를 작성해 넘겨야 합니다.
            // 여기서는 레이어를 새로고침하여 로드하는 방식으로 처리합니다.
            map.removeLayer(contourLayer);
            contourLayer.addTo(map);
        });

        // 클릭 시 고도 측정
        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            
            fetch(`https://api.vworld.kr/req/address?service=address&request=getcoord&key=${VWORLD_KEY}&location=${lng},${lat}&type=parcel&ele=true`)
                .then(res => res.json())
                .then(data => {
                    let elevation = (data.response && data.response.status === "OK") 
                                    ? data.response.result.elevation 
                                    : "측정 불가";

                    L.popup()
                        .setLatLng(e.latlng)
                        .setContent(`<b>고도: ${elevation}m</b><br><span style="font-size:11px;">(해수면 기준)</span>`)
                        .openOn(map);
                });
        });
    </script>
</body>
</html>
